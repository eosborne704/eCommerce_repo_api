{% extends 'base.html' %}
{% block title %}
    Delete Product
{% endblock %}
{% block content %}
    <h2>Are you sure you want to delete this product?</h2>
    <form method="post" action="{% url 'delete_product' pk=product.pk %}">
        {% csrf_token %}
        <button type="submit">Delete</button>
    </form>
    <a href="{% url 'all_products' store_id=product.store.pk %}">Back to Products Page</a>
{% endblock %}
