{% extends 'base.html' %}
{% block title %}
	Delete Review
{% endblock %}
{% block content %}
	<h2>Are you sure you want to delete this review?</h2>
	<form method="post" action="{% url 'delete_review' pk=review.pk %}">
		{% csrf_token %}
		<button type="submit">Delete</button>
	</form>
	<a href="{% url 'all_reviews' product_id=review.product.pk %}">Back to Reviews</a>
{% endblock %}
